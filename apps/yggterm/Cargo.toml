[package]
name = "yggterm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "GPL-3.0-or-later"

[[bin]]
name = "yggterm"
path = "src/main.rs"

[features]
default = ["ghostty-ffi"]
ghostty-ffi = ["yggterm-ghostty-bridge/ghostty-ffi"]
zed-upstream = ["yggterm-zed-shell/zed-upstream"]

[dependencies]
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
yggterm-core = { path = "../../crates/yggterm-core" }
yggterm-ghostty-bridge = { path = "../../crates/yggterm-ghostty-bridge" }
yggterm-zed-shell = { path = "../../crates/yggterm-zed-shell" }
