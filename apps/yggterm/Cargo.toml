[package]
name = "yggterm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "Apache-2.0"

[[bin]]
name = "yggterm"
path = "src/main.rs"

[features]
default = []
ghostty-ffi = ["yggterm-server/ghostty-ffi"]

[dependencies]
anyhow.workspace = true
ctrlc = "3"
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
yggterm-core = { path = "../../crates/yggterm-core" }
yggterm-server = { path = "../../crates/yggterm-server" }
yggui = { path = "../../crates/yggui" }
