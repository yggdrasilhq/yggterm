[package]
name = "yggterm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "Apache-2.0"

[[bin]]
name = "yggterm"
path = "src/main.rs"

[features]
default = ["ghostty-ffi"]
ghostty-ffi = ["yggterm-ghostty-bridge/ghostty-ffi"]

[dependencies]
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
yggterm-core = { path = "../../crates/yggterm-core" }
yggterm-ghostty-bridge = { path = "../../crates/yggterm-ghostty-bridge" }
yggterm-gtk-glue = { path = "../../crates/yggterm-gtk-glue" }
yggterm-ui = { path = "../../crates/yggterm-ui" }
