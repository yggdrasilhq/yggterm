[package]
edition = "2021"
rust-version = "1.76.0"
name = "dioxus-desktop"
version = "0.7.3"
authors = ["Jonathan Kelley"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "WebView renderer for Dioxus"
homepage = "https://dioxuslabs.com/learn/0.7/getting_started"
readme = "README.md"
keywords = [
    "dom",
    "ui",
    "gui",
    "react",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/DioxusLabs/dioxus/"

[package.metadata.docs.rs]
features = [
    "tokio_runtime",
    "devtools",
]
cargo-args = [
    "-Zunstable-options",
    "-Zrustdoc-scrape-examples",
]
default-features = false
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
    "armv7-linux-androideabi",
]

[features]
default = [
    "tokio_runtime",
    "transparent",
    "devtools",
]
devtools = [
    "wry/devtools",
    "dep:dioxus-devtools",
    "dioxus-signals",
]
fullscreen = ["wry/fullscreen"]
gnu = []
tokio_runtime = ["dep:tokio"]
transparent = ["wry/transparent"]

[lib]
name = "dioxus_desktop"
path = "src/lib.rs"

[[test]]
name = "check_eval"
path = "headless_tests/eval.rs"
harness = false

[[test]]
name = "check_events"
path = "headless_tests/events.rs"
harness = false

[[test]]
name = "check_forms"
path = "headless_tests/forms.rs"
harness = false

[[test]]
name = "check_rendering"
path = "headless_tests/rendering.rs"
harness = false

