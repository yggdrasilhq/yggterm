name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Install Zig
        run: ./scripts/setup-zig.sh

      - name: Clone Ghostty sibling repo
        run: git clone --depth 1 https://github.com/ghostty-org/ghostty ../ghostty

      - name: Clone Zed sibling repo
        run: git clone --depth 1 https://github.com/zed-industries/zed ../zed

      - name: Package release artifacts
        run: ./scripts/package-release.sh linux-x86_64

      - name: Package FFI bundle
        run: ./scripts/package-release-ffi.sh linux-x86_64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yggterm-release-artifacts
          path: dist/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yggterm-linux-x86_64
            dist/yggterm-linux-x86_64.sha256
            dist/yggterm-linux-x86_64.tar.gz
            dist/yggterm-linux-x86_64.tar.gz.sha256
            dist/yggterm-linux-x86_64-ghostty-ffi.tar.gz
            dist/yggterm-linux-x86_64-ghostty-ffi.tar.gz.sha256
            dist/yggterm_*.deb
            dist/yggterm_*.deb.sha256
