name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  proof-bundles:
    name: Collect proof bundle metadata
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate proof bundles
        run: python3 scripts/validate_demo_manifests.py

      - name: Upload proof bundle metadata
        uses: actions/upload-artifact@v4
        with:
          name: yggterm-proof-bundles
          path: artifacts/demos/unreleased/**

  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            runs_on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - label: macos-x86_64
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
          - label: macos-aarch64
            runs_on: macos-14
            target: aarch64-apple-darwin
          - label: windows-x86_64
            runs_on: windows-2022
            target: x86_64-pc-windows-msvc
          - label: windows-aarch64
            runs_on: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system packages
        if: startsWith(matrix.runs_on, 'ubuntu-24.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}

      - name: Package portable release artifacts
        shell: bash
        run: ./scripts/package-platform-release.sh "${{ matrix.label }}" "${{ matrix.target }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yggterm-${{ matrix.label }}
          path: |
            dist/yggterm-${{ matrix.label }}*

  package-linux-deb:
    name: Package Linux deb
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Package Debian artifact
        run: ./scripts/package-deb.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yggterm-linux-deb
          path: |
            dist/yggterm_*.deb
            dist/yggterm_*.deb.sha256

  publish-release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/v') && always()
    needs:
      - proof-bundles
      - package
      - package-linux-deb
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate curated release notes
        run: ./scripts/release-notes.sh "${{ github.ref_name }}" > release-artifacts/RELEASE_NOTES.md

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-artifacts/RELEASE_NOTES.md
          files: |
            release-artifacts/*
