name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-demo-manifests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate demo manifests
        run: python3 scripts/validate_demo_manifests.py

      - name: Validate architecture contracts
        run: python3 scripts/check_architecture_contracts.py

  build-linux:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs_on: ubuntu-24.04
          - label: linux-aarch64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build release binary
        run: cargo build --release -p yggterm --no-default-features

      - name: Run focused regression tests
        run: |
          cargo test -p yggterm-core --no-default-features linux_desktop_entry_uses_theme_icon_and_canonical_wm_class
          cargo test -p yggterm-server --no-default-features initial_remote_resume_attach
          cargo test -p yggterm-server --no-default-features terminal_manager_reports_missing_remote_scrollback_after_tail_only
          cargo test -p yggterm-server --no-default-features saved_session_reuses_recovered_interrupted_runtime_snapshot
          cargo test -p yggterm-server --no-default-features terminal_utf8_decoder_preserves_box_drawing_across_read_boundaries
          cargo test -p yggterm-server --no-default-features remote_resume_runtime_output_requires_restart_for_shell_prompt
          cargo test -p yggterm-server --no-default-features remote_resume_seed_snapshot_prefill_rejects_codex_role_transcript
          cargo test -p yggterm-server --no-default-features initial_remote_resume_attach_prefers_screen_snapshot_over_stale_prose_tail
          cargo test -p yggterm-server --no-default-features terminal_manager_retained_snapshot_exposes_full_history_for_ui_replay
          cargo test -p yggterm-server --no-default-features preserving_close_command_serializes_as_distinct_restart_safe_kind
          cargo test -p yggterm-server --no-default-features remote_preview_payload_terminal_prefill_is_disabled_for_live_terminal
          cargo test -p yggterm-server --no-default-features persisted_state_only_keeps_explicitly_kept_live_sessions
          cargo test -p yggterm-server --no-default-features restore_persisted_state_skips_unkept_recoverable_live_sessions_without_update_reason
          cargo test -p yggterm-server --no-default-features restore_persisted_state_restores_unkept_update_restart_live_sessions_once
          cargo test -p yggterm-server --no-default-features startup_prewarm_keeps_remote_live_sessions_eligible_for_background_load
          cargo test -p yggterm-server --no-default-features startup_prewarm_skips_remote_snapshot_seed_for_latency_budget
          cargo test -p yggterm-server --no-default-features remote_start_requests_get_longer_daemon_response_budget
          cargo test -p yggterm-server --no-default-features remote_session_terminal_input_uses_hot_local_runtime_before_remote_fallback
          cargo test -p yggterm-server --no-default-features remote_terminal_write_normalizes_bare_carriage_return_for_codex_runtime
          cargo test -p yggterm-server --no-default-features versioned_server_status_probe_paths_dedupe_symlink_aliases_before_status
          cargo test -p yggterm-server --no-default-features remote_preview_refresh_uses_cached_scan_without_remote_io_for_live_session
          cargo test -p yggterm-shell --no-default-features linux_desktop_app_id_ignores_update_handoff_multi_window_env
          cargo test -p yggterm-shell --no-default-features retained_ready_remote_host_reuses_bootstrap_on_focus_return
          cargo test -p yggterm-shell --no-default-features remote_resume_bootstrap_epoch_stays_stable_until_failure
          cargo test -p yggterm-shell --no-default-features active_retained_remote_session_does_not_bootstrap_again_on_focus_return
          cargo test -p yggterm-shell --no-default-features inactive_retained_ready_session_keeps_current_host_hot
          cargo test -p yggterm-shell --no-default-features active_remote_bootstrap_lease_is_not_retained_live_until_ready
          cargo test -p yggterm-shell --no-default-features remote_codex_resume_snapshot_replay_rejects_generic_shell_prompt
          cargo test -p yggterm-shell --no-default-features active_live_remote_row_is_hot_terminal_fast_path
          cargo test -p yggterm-shell --no-default-features inactive_live_remote_row_is_hot_terminal_fast_path
          cargo test -p yggterm-shell --no-default-features remote_live_session_prompt_ready_replay_uses_server_snapshot_tail
          cargo test -p yggterm-shell --no-default-features remote_live_session_prompt_ready_replay_can_be_selected_by_session_path
          cargo test -p yggterm-shell --no-default-features remote_live_session_prompt_ready_replay_does_not_require_codex_card
          cargo test -p yggterm-shell --no-default-features remote_live_session_prompt_ready_replay_accepts_cursor_addressed_default_prompt
          cargo test -p yggterm-shell --no-default-features app_control_terminal_input_preserves_remote_session_write_path
          cargo test -p yggterm-shell --no-default-features active_prompt_replay_falls_back_to_server_live_session_snapshot
          cargo test -p yggterm-shell --no-default-features active_replay_prefers_current_live_runtime_snapshot_over_stale_active_copy
          cargo test -p yggterm-shell --no-default-features active_recovery_snapshot_probe_only_starts_for_unready_active_remote
          cargo test -p yggterm-shell --no-default-features active_recovery_snapshot_probe_identity_tracks_open_attempts
          cargo test -p yggterm-shell --no-default-features server_prompt_snapshot_replay_starts_for_retained_recovering_remote
          cargo test -p yggterm-shell --no-default-features server_prompt_snapshot_replay_identity_tracks_recovery_attempts
          cargo test -p yggterm-shell --no-default-features remote_retained_surface_fault_invalidates_empty_and_idle_hosts
          cargo test -p yggterm-shell --no-default-features new_mount_bootstrap_lease_replaces_inflight_older_lease
          cargo test -p yggterm-shell --no-default-features remote_open_rearms_unready_retained_bootstrap
          cargo test -p yggterm-shell --no-default-features terminal_paint_geometry_sends_initial_resize_once
          cargo test -p yggterm-shell --no-default-features fresh_remote_codex_start_surface_requires_prompt_ready_surface
          cargo test -p yggterm-shell --no-default-features created_remote_terminal_prewarm_targets_live_remote_paths
          cargo test -p yggterm-shell --no-default-features retained_rehydrate_script_replays_only_collapsed_xterm_buffers
          cargo test -p yggterm-shell --no-default-features retained_replay_script_rejects_existing_internal_transport_buffer
          cargo test -p yggterm-shell --no-default-features sanitize_terminal_replay_payload_strips_carriage_return_internal_transport_noise
          cargo test -p yggterm-shell --no-default-features sanitize_terminal_replay_payload_strips_wrapped_transport_footer_from_live_capture
          cargo test -p yggterm-shell --no-default-features sanitize_terminal_replay_payload_strips_cursor_addressed_transport_suffix
          cargo test -p yggterm-shell --no-default-features transport_error_detector_keeps_wrapped_shared_connection_fragment
          cargo test -p yggterm-shell --no-default-features suppress_resume_output_rejects_transport_error_after_overlay_dismissed
          cargo test -p yggterm-shell --no-default-features describe_viewport_snapshot_treats_clean_daemon_pty_as_visible_despite_stale_resume_toast
          cargo test -p yggterm-shell --no-default-features viewport_visible_daemon_pty_ready_observation_clears_stale_resume_gate
          cargo test -p yggterm-shell --no-default-features daemon_retained_snapshot_replay_starts_for_ready_active_remote_session
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_defers_initial_blank_host_rebuild_until_after_first_paint_probe
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_throttles_hot_render_bridge_work
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_focuses_host_and_scopes_wheel_capture
          cargo test -p yggterm-shell --no-default-features app_control_terminal_input_splits_interrupt_from_following_bytes
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_resets_visible_transport_leak_before_clean_write
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_locks_even_one_line_scrollback
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_forces_cursor_follow_on_input_and_focus
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_tracks_explicit_scrollback_intent
          cargo test -p yggterm-shell --no-default-features live_session_close_success_uses_terminal_copy_not_item_delete_copy
          cargo test -p yggterm-shell --no-default-features live_session_keep_alive_dot_renders_in_fixed_leading_rail
          cargo test -p yggterm --no-default-features superseded_client_close_command_preserves_live_sessions
          cargo test -p yggterm --no-default-features superseded_client_retirement_is_process_only_not_app_control_close
          cargo test -p yggterm --no-default-features linux_kde_wayland_window_profile_uses_transparent_corners
          cargo test -p yggterm-shell --no-default-features linux_transparent_startup_reveal_waits_for_initial_shape
          cargo test -p yggterm-shell --no-default-features opaque_shell_root_uses_filled_background_to_avoid_native_corner_artifacts
          cargo test -p yggterm-shell --no-default-features startup_hot_swap_reason_targets_stale_daemon_versions_only
          cargo test -p yggterm-shell --no-default-features xterm_canvas_renderer_keeps_dim_prompt_text_readable
          cargo test -p yggterm-shell --no-default-features focused_terminal_defers_background_refreshes
          cargo test -p yggterm-shell --no-default-features terminal_probe_per_char_does_not_sleep_after_every_character
          python3 -m py_compile scripts/smoke_ui_latency.py
          cargo test -p yggterm-shell --no-default-features terminal_cursor_colors_follow_ghostty_theme_contract_across_themes
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_preserves_native_xterm_cursor_contract
          cargo test -p yggterm-shell --no-default-features parses_ghostty_cursor_text_when_present
          cargo test -p yggterm-shell --no-default-features remote_resume_attach_confirmation_accepts_runtime_prompt_surface_after_deadline
          cargo test -p yggterm-shell --no-default-features remote_resume_blank_host_snapshot_replay_accepts_prompt_ready_screen
          cargo test -p yggterm-shell --no-default-features remote_resume_non_prompt_snapshot_replay_accepts_prompt_ready_snapshot
          cargo test -p yggterm-shell --no-default-features remote_resume_visual_reveal_accepts_codex_prompt_ready_tail_after_transcript
          cargo test -p yggterm-shell --no-default-features suppress_stale_remote_idle_after_server_prompt_blocks_card_overwrites
          cargo test -p yggterm-shell --no-default-features codex_interrupted_input_surface_without_prompt_is_not_prompt_ready
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_input_enabled_codex_status_surface_without_prompt
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_accepts_remote_codex_prompt_only_surface_with_real_output
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_accepted_remote_input_without_stream_echo
          cargo test -p yggterm-shell --no-default-features terminal_chunk_has_codex_prompt_output_accepts_codex_prompt_line
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_remote_codex_title_card_without_prompt
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_accepts_input_enabled_interrupted_codex_input_surface
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_input_disabled_stale_retained_remote_prose
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_offscreen_active_host
          cargo test -p yggterm-shell --no-default-features viewport_rejects_remote_live_preview_fallback
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_input_enabled_transcript_browser_surface
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_rejects_codex_role_transcript_surface
          cargo test -p yggterm-shell --no-default-features remote_resume_surface_connected_rejects_live_transcript_browser_surface
          cargo test -p yggterm-shell --no-default-features viewport_surface_problem_demotes_latched_ready_attempt
          cargo test -p yggterm-shell --no-default-features retained_remote_lost_scrollback_invalidates_live_host
          cargo test -p yggterm-shell --no-default-features retained_fault_bootstrap_uses_live_active_session_when_snapshot_is_stale
          python3 -m py_compile scripts/smoke_xterm_embed_faults.py
          python3 -m py_compile scripts/smoke_terminal_status_input.py

      - name: Check shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/package-deb.sh
          bash -n scripts/package-platform-release.sh
          bash -n scripts/package-release.sh
          bash -n scripts/package-release-ffi.sh

      - name: Validate PowerShell installer syntax
        run: pwsh -NoProfile -Command "[void][scriptblock]::Create((Get-Content 'scripts/install.ps1' -Raw))"

      - name: Validate release binary
        run: |
          test -x ./target/release/yggterm
          file ./target/release/yggterm

  build-windows:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runs_on: windows-2022
          - label: windows-aarch64
            runs_on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build release binary
        shell: bash
        run: cargo build --release -p yggterm --no-default-features

      - name: Validate release binary
        shell: bash
        run: |
          test -f ./target/release/yggterm.exe

      - name: Validate GUI subsystem
        shell: powershell
        run: |
          ./scripts/verify_windows_gui_subsystem.ps1 -Path ./target/release/yggterm.exe

      - name: Validate PowerShell installer syntax
        shell: powershell
        run: |
          [void][scriptblock]::Create((Get-Content 'scripts/install.ps1' -Raw))
