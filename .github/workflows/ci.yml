name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-demo-manifests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate demo manifests
        run: python3 scripts/validate_demo_manifests.py

  build-linux:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs_on: ubuntu-24.04
          - label: linux-aarch64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build release binary
        run: cargo build --release -p yggterm --no-default-features

      - name: Run focused regression tests
        run: |
          cargo test -p yggterm-core --no-default-features linux_desktop_entry_uses_theme_icon_and_canonical_wm_class
          cargo test -p yggterm-server --no-default-features initial_remote_resume_attach
          cargo test -p yggterm-server --no-default-features terminal_manager_reports_missing_remote_scrollback_after_tail_only
          cargo test -p yggterm-server --no-default-features saved_session_reuses_recovered_interrupted_runtime_snapshot
          cargo test -p yggterm-server --no-default-features remote_resume_runtime_output_requires_restart_for_shell_prompt
          cargo test -p yggterm-server --no-default-features remote_resume_seed_snapshot_prefill_keeps_recovered_transcript_after_breakage
          cargo test -p yggterm-server --no-default-features remote_preview_payload_terminal_prefill_provides_scrollback
          cargo test -p yggterm-shell --no-default-features linux_desktop_app_id_ignores_update_handoff_multi_window_env
          cargo test -p yggterm-shell --no-default-features retained_ready_remote_host_reuses_bootstrap_on_focus_return
          cargo test -p yggterm-shell --no-default-features remote_resume_bootstrap_epoch_stays_stable_until_failure
          cargo test -p yggterm-shell --no-default-features active_retained_remote_session_does_not_bootstrap_again_on_focus_return
          cargo test -p yggterm-shell --no-default-features retained_rehydrate_script_replays_only_collapsed_xterm_buffers
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_defers_initial_blank_host_rebuild_until_after_first_paint_probe
          cargo test -p yggterm-shell --no-default-features terminal_eval_script_throttles_hot_render_bridge_work
          cargo test -p yggterm-shell --no-default-features remote_resume_attach_confirmation_accepts_runtime_prompt_surface_after_deadline
          cargo test -p yggterm-shell --no-default-features remote_resume_visual_reveal_accepts_codex_prompt_ready_tail_after_transcript
          cargo test -p yggterm-shell --no-default-features terminal_host_problem_accepts_input_enabled_codex_status_surface
          cargo test -p yggterm-shell --no-default-features viewport_surface_problem_demotes_latched_ready_attempt
          cargo test -p yggterm-shell --no-default-features retained_remote_lost_scrollback_invalidates_live_host
          cargo test -p yggterm-shell --no-default-features retained_fault_bootstrap_uses_live_active_session_when_snapshot_is_stale
          python3 -m py_compile scripts/smoke_xterm_embed_faults.py

      - name: Check shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/package-deb.sh
          bash -n scripts/package-platform-release.sh
          bash -n scripts/package-release.sh
          bash -n scripts/package-release-ffi.sh

      - name: Validate PowerShell installer syntax
        run: pwsh -NoProfile -Command "[void][scriptblock]::Create((Get-Content 'scripts/install.ps1' -Raw))"

      - name: Validate release binary
        run: |
          test -x ./target/release/yggterm
          file ./target/release/yggterm

  build-windows:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runs_on: windows-2022
          - label: windows-aarch64
            runs_on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build release binary
        shell: bash
        run: cargo build --release -p yggterm --no-default-features

      - name: Validate release binary
        shell: bash
        run: |
          test -f ./target/release/yggterm.exe

      - name: Validate GUI subsystem
        shell: powershell
        run: |
          ./scripts/verify_windows_gui_subsystem.ps1 -Path ./target/release/yggterm.exe

      - name: Validate PowerShell installer syntax
        shell: powershell
        run: |
          [void][scriptblock]::Create((Get-Content 'scripts/install.ps1' -Raw))
