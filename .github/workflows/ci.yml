name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-linux:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs_on: ubuntu-24.04
          - label: linux-aarch64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build release binary
        run: cargo build --release -p yggterm --no-default-features

      - name: Check shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/package-deb.sh
          bash -n scripts/package-platform-release.sh
          bash -n scripts/package-release.sh
          bash -n scripts/package-release-ffi.sh

      - name: Validate PowerShell installer syntax
        run: pwsh -NoProfile -Command "[void][scriptblock]::Create((Get-Content 'scripts/install.ps1' -Raw))"

      - name: Validate release binary
        run: |
          test -x ./target/release/yggterm
          file ./target/release/yggterm

  build-windows:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runs_on: windows-2022
          - label: windows-aarch64
            runs_on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build release binary
        shell: bash
        run: cargo build --release -p yggterm --no-default-features

      - name: Validate release binary
        shell: bash
        run: |
          test -f ./target/release/yggterm.exe

      - name: Validate PowerShell installer syntax
        shell: powershell
        run: |
          [void][scriptblock]::Create((Get-Content 'scripts/install.ps1' -Raw))
