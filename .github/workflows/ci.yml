name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            fakeroot \
            jq \
            pkg-config \
            protobuf-compiler \
            ripgrep \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Install Zig
        run: ./scripts/setup-zig.sh

      - name: Build release binary
        run: cargo build --release -p yggterm --no-default-features

      - name: Check shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/package-deb.sh
          bash -n scripts/package-platform-release.sh
          bash -n scripts/package-release.sh

      - name: Validate npm launcher
        run: node --check npm/bin/yggterm.js

      - name: Validate release binary
        run: |
          test -x ./target/release/yggterm
          file ./target/release/yggterm
