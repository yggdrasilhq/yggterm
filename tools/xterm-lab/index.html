<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yggterm xterm.js Lab</title>
    <link rel="stylesheet" href="../../assets/xterm/xterm.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #171b22;
        --panel: #222833;
        --panel-2: #2b323f;
        --text: #e7edf5;
        --muted: #aab4c2;
        --accent: #39a7d7;
        --border: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
        min-height: 100vh;
        padding: 16px;
      }

      #terminal-frame {
        min-width: 0;
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: #262a33;
      }

      #terminal {
        width: 100%;
        height: calc(100vh - 34px);
        padding: 8px;
      }

      aside {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      section {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      label {
        display: grid;
        gap: 5px;
        font-size: 12px;
        color: var(--muted);
      }

      select,
      input,
      button {
        width: 100%;
        min-height: 32px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
      }

      input {
        padding: 6px 8px;
      }

      button {
        cursor: pointer;
        text-align: left;
        padding: 7px 9px;
      }

      button:hover {
        border-color: rgba(57, 167, 215, 0.75);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      pre {
        max-height: 34vh;
        overflow: auto;
        margin: 0;
        padding: 10px;
        border-radius: 6px;
        background: #11151b;
        color: #d8e2ef;
        font: 12px/1.45 "JetBrains Mono", "DejaVu Sans Mono", monospace;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 980px) {
        main {
          grid-template-columns: 1fr;
        }

        #terminal {
          height: 58vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="terminal-frame">
        <div id="terminal"></div>
      </div>

      <aside>
        <section>
          <h1>xterm.js Lab</h1>
          <p>
            Isolated fixtures for prompt background, partial resize repaints,
            canvas/DOM renderer behavior, and buffer-cell attributes.
          </p>
        </section>

        <section>
          <div class="row">
            <label>
              Renderer
              <select id="renderer">
                <option value="canvas">canvas</option>
                <option value="dom">dom</option>
              </select>
            </label>
            <label>
              Theme
              <select id="theme">
                <option value="dark">dark</option>
                <option value="light">light</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label>
              Columns
              <input id="cols" type="number" min="40" max="220" value="120" />
            </label>
            <label>
              Rows
              <input id="rows" type="number" min="12" max="80" value="36" />
            </label>
          </div>
          <button id="rebuild">Rebuild terminal</button>
          <button id="fit">Fit to frame</button>
        </section>

        <section>
          <button data-fixture="plainPrompt">Plain prompt, default bg</button>
          <button data-fixture="truecolorPrompt">Prompt with truecolor bg</button>
          <button data-fixture="jojoPayload">Jojo partial payload sample</button>
          <button data-fixture="resizeBork">Resize partial repaint fixture</button>
          <button data-fixture="fullRepaint">Full repaint after resize</button>
          <button data-fixture="workingAnimation">Codex-style inline animation</button>
        </section>

        <section>
          <pre id="diagnostics">waiting for terminal</pre>
        </section>
      </aside>
    </main>

    <script src="../../assets/xterm/xterm.js"></script>
    <script src="../../assets/xterm/addon-fit.js"></script>
    <script src="../../assets/xterm/addon-canvas.js"></script>
    <script src="./lab.js"></script>
  </body>
</html>
